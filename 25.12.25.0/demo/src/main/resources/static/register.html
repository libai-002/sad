<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - FunZone</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="brand-logo">Fun<span>Zone</span></div>
        <p class="auth-subtitle">创建您的账号，开启社交之旅</p>
        
        <form action="#" method="POST">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" class="form-control" placeholder="设置一个好听的名字" required>
            </div>

            <div class="form-group">
                <label for="email">邮箱地址</label>
                <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">设置密码</label>
                <input type="password" id="password" class="form-control" placeholder="至少6位字符" required>
                <label style="display:inline-flex;align-items:center;gap:6px;margin-top:6px;font-size:0.85rem;color:#636e72;">
                    <input type="checkbox" id="toggleRegPwd"> 显示密码
                </label>
            </div>

            <div class="form-group">
                <label for="confirm-password">确认密码</label>
                <input type="password" id="confirm-password" class="form-control" placeholder="请再次输入密码" required>
                <label style="display:inline-flex;align-items:center;gap:6px;margin-top:6px;font-size:0.85rem;color:#636e72;">
                    <input type="checkbox" id="toggleRegConfirmPwd"> 显示密码
                </label>
            </div>
            
            <button type="submit" class="btn-primary">立即注册</button>
        </form>

        <div class="auth-footer">
            <p>已有账号？ <a href="login.html">直接登录</a></p>
        </div>
    </div>
    
    <script src="js/sunrays.js"></script>
    <script>
        document.querySelector('form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('注册成功！即将跳转登录页面');
                    window.location.href = 'login.html';
                } else {
                    // 处理错误信息，如果是 map 则展示第一个，如果是 string 则直接展示
                    const errorMsg = typeof data === 'object' ? Object.values(data)[0] : data;
                    alert('注册失败: ' + (errorMsg || '未知错误'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('发生网络错误，请稍后重试');
            }
        });
        document.getElementById('toggleRegPwd').addEventListener('change', function() {
            document.getElementById('password').type = this.checked ? 'text' : 'password';
        });
        document.getElementById('toggleRegConfirmPwd').addEventListener('change', function() {
            document.getElementById('confirm-password').type = this.checked ? 'text' : 'password';
        });
    </script>
</body>
</html>
