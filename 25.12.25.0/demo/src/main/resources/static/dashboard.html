<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>组队大厅 - FunZone</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="nav-left">
            <div class="brand-logo" style="font-size: 1.5rem; margin-bottom: 0;">Fun<span>Zone</span></div>
            <div class="nav-links">
                <a href="#" class="active">组队大厅</a>
                <a href="http://localhost:8081/squads.html">我的小队</a>
                <a href="/dynamic.html">动态广场</a>
            </div>
        </div>
        <div class="nav-right">
            <div class="search-box" style="position: relative;">
                <form action="/search.html" method="GET" style="margin:0;">
                    <input name="q" type="text" placeholder="搜索小队/游戏..." style="padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid #dfe6e9; outline: none; background: #f8f9fa;">
                    <button type="submit" style="display:none;"></button>
                </form>
            </div>
            <div class="notification-btn" style="font-size: 1.2rem; color: #636e72; cursor: pointer;">
                <i class="fas fa-bell"></i>
            </div>
            <div class="user-profile">
                <a href="profile.html" style="display: flex; align-items: center; text-decoration: none; color: inherit;">
                    <div class="avatar" id="userAvatar">U</div>
                    <span id="userNameDisplay" style="font-weight: 600; font-size: 0.9rem; margin-left: 0.5rem;">User</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- 主体内容 -->
    <div class="main-container">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <!-- 个人概览 -->
            <div class="sidebar-card">
                <div class="sidebar-title">
                    我的名片
                    <a href="profile.html"><i class="fas fa-edit" style="font-size: 0.9rem; color: #b2bec3; cursor: pointer;"></i></a>
                </div>
                <div style="text-align: center; margin-bottom: 1rem;">
                    <a href="profile.html" style="text-decoration: none; color: inherit;">
                        <div class="avatar" style="width: 60px; height: 60px; margin: 0 auto; font-size: 1.5rem; background: var(--primary-color);">U</div>
                        <h3 style="margin-top: 0.5rem;" id="sidebarUserName">User</h3>
                    </a>
                    <div style="color: #636e72; font-size: 0.85rem;">信誉分: <span style="color: var(--success-color); font-weight: bold;">98</span></div>
                </div>
                <div class="tag-cloud">
                    <a class="tag" href="/search/index.html" style="text-decoration: none;">更多</a>
                </div>
            </div>

            <!-- 我的小队 -->
            <div class="sidebar-card">
                <div class="sidebar-title">
                    我的小队
                    <span style="font-size: 0.8rem; color: var(--primary-color); cursor: pointer;">创建</span>
                </div>
                <div class="squad-list-mini">
                    <div class="squad-item">
                        <div class="squad-avatar-mini" style="background: #fab1a0;">🐱</div>
                        <div>
                            <div style="font-weight: 600; font-size: 0.9rem;">周末撸猫小队</div>
                            <div style="font-size: 0.75rem; color: #b2bec3;">3条新消息</div>
                        </div>
                    </div>
                    <div class="squad-item">
                        <div class="squad-avatar-mini" style="background: #74b9ff;">🎮</div>
                        <div>
                            <div style="font-weight: 600; font-size: 0.9rem;">王者上分车队</div>
                            <div style="font-size: 0.75rem; color: #b2bec3;">今晚20:00活动</div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 右侧主要内容 -->
        <main class="content-area">
            <!-- 热门兴趣标签 -->
            <div style="margin-bottom: 2rem;">
                <h2 style="margin-bottom: 1rem; font-size: 1.2rem;">热门兴趣</h2>
                <div class="tag-cloud">
                    <a class="tag active" href="/search/index.html" style="text-decoration: none;">更多</a>
                </div>
            </div>

            <!-- 推荐小队 -->
            <div class="section-header">
                <h2 style="font-size: 1.2rem;">推荐小队</h2>
                <a href="#" style="color: var(--primary-color); font-size: 0.9rem; text-decoration: none;">查看更多</a>
            </div>

            <div class="squad-grid">
                
            </div>
        </main>
    </div>

    <script src="js/sunrays.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 从 localStorage 获取用户信息
            const userStr = localStorage.getItem('currentUser');
            
            if (!userStr) {
                // 如果没有登录信息，跳转回登录页
                alert('请先登录');
                window.location.href = 'login.html';
                return;
            }

            const user = JSON.parse(userStr);
            const username = user.username;
            
            // 更新 UI 显示
            document.getElementById('userNameDisplay').textContent = username;
            document.getElementById('sidebarUserName').textContent = username;
            
            // 设置头像 (取用户名的第一个字符)
            const firstChar = username.charAt(0).toUpperCase();
            document.getElementById('userAvatar').textContent = firstChar;
            
            // 如果有侧边栏头像，也更新一下
            const sidebarAvatar = document.querySelector('.sidebar-card .avatar');
            if (sidebarAvatar) {
                sidebarAvatar.textContent = firstChar;
            }

            const navSearchInput = document.querySelector('.nav-right .search-box input');
            if (navSearchInput) {
                navSearchInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        const kw = navSearchInput.value.trim();
                        const url = kw ? '/search.html?q=' + encodeURIComponent(kw) : '/search.html';
                        window.location.href = url;
                    }
                });
            }

            // 绑定登出功能
            const logoutBtn = document.createElement('a');
            logoutBtn.href = "#";
            logoutBtn.textContent = "退出";
            logoutBtn.style.marginLeft = "1rem";
            logoutBtn.style.color = "#636e72";
            logoutBtn.style.textDecoration = "none";
            logoutBtn.style.fontSize = "0.9rem";
            
            logoutBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if(confirm('确定要退出登录吗？')) {
                    localStorage.removeItem('currentUser');
                    window.location.href = 'index.html';
                }
            });
            
            document.querySelector('.user-profile').appendChild(logoutBtn);
            
            const grid = document.querySelector('.squad-grid');
            if (grid) {
                grid.innerHTML = '';
            }
            (async function loadRecommended() {
                try {
                    const cu = JSON.parse(localStorage.getItem('currentUser') || '{}');
                    const userId = cu.id;
                    let joinedSet = new Set();
                    if (userId) {
                        try {
                            const jr = await fetch('/api/squads/joined/' + userId);
                            const jl = await jr.json();
                            if (jr.ok && Array.isArray(jl)) {
                                jl.forEach(it => joinedSet.add(it.id));
                            }
                        } catch (e) {}
                    }
                    const resp = await fetch('/api/squads/recommended?limit=8');
                    if (!resp.ok) return;
                    const list = await resp.json();
                    if (!grid) return;
                    list.forEach(s => {
                        const full = (s.currentMembers != null && s.maxMembers != null && s.currentMembers >= s.maxMembers);
                        const statusText = full ? '满员' : '招募中';
                        const already = joinedSet.has(s.id);
                        const btnText = full ? '已满员' : (already ? '已加入' : '申请加入');
                        const btnDisabled = (full || already) ? 'disabled' : '';
                        const tags = (s.tags || '').split(/[，,\s]+/).filter(Boolean);
                        const card = document.createElement('div');
                        card.className = 'squad-card';
                        card.innerHTML = `
                          <div class="squad-cover"><div class="squad-status ${full ? '' : 'recruiting'}">${statusText}</div></div>
                          <div class="squad-body">
                            <div class="squad-name">${s.name || ''}</div>
                            <div class="squad-desc">${s.description || ''}</div>
                            <div class="squad-tags">${tags.map(t => `<span class='tag-mini'>${t}</span>`).join('')}</div>
                            <div class="squad-meta"><span><i class="fas fa-users"></i> ${s.currentMembers || 0}/${s.maxMembers || 0} 人</span></div>
                            <button class="btn-primary join-btn" data-id="${s.id}" ${btnDisabled} style="margin-top:0; padding:0.5rem;">${btnText}</button>
                          </div>`;
                        grid.appendChild(card);
                        const btn = card.querySelector('.join-btn');
                        if (btn && !btnDisabled) {
                            btn.addEventListener('click', async function() {
                                if (!userId) {
                                    alert('请先登录');
                                    return;
                                }
                                const squadId = s.id;
                                if (joinedSet.has(squadId)) {
                                    alert('已经加入');
                                    return;
                                }
                                try {
                                    const resp2 = await fetch('/api/squads/join/by-id', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ userId, squadId })
                                    });
                                    const data2 = await resp2.json();
                                    if (resp2.ok) {
                                        alert('已加入');
                                        joinedSet.add(squadId);
                                        btn.textContent = '已加入';
                                        btn.disabled = true;
                                    } else {
                                        const msg = (data2 && data2.error) ? data2.error : '加入失败';
                                        alert(msg);
                                    }
                                } catch (e) {
                                    alert('加入失败：网络错误');
                                }
                            });
                        }
                    });
                    if (list.length === 0) {
                        const empty = document.createElement('div');
                        empty.style.color = '#888';
                        empty.textContent = '暂无推荐小队';
                        grid.appendChild(empty);
                    }
                } catch (e) {}
            })();
        });
    </script>
</body>
</html>
