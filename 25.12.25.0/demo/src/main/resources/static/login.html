<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - FunZone</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="brand-logo">Fun<span>Zone</span></div>
        <p class="auth-subtitle">欢迎回来，请登录您的账号</p>
        
        <form action="#" method="POST">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" class="form-control" placeholder="请输入您的用户名" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" class="form-control" placeholder="请输入密码" required>
                <label style="display:inline-flex;align-items:center;gap:6px;margin-top:6px;font-size:0.85rem;color:#636e72;">
                    <input type="checkbox" id="toggleLoginPwd"> 显示密码
                </label>
            </div>
            
            <button type="submit" class="btn-primary">立即登录</button>
        </form>

        <div class="auth-footer">
            <p>还没有账号？ <a href="register.html">立即注册</a></p>
            <p style="margin-top: 0.5rem;"><a id="forgotLink" href="#" style="font-size: 0.8rem; color: #b2bec3;">忘记密码？</a></p>
        </div>

        <div class="social-login">
            <p style="font-size: 0.8rem; color: #b2bec3; margin-bottom: 1rem;">其他方式登录</p>
            <div class="social-btn" id="wxLoginBtn" title="微信登录">W</div>
            <div class="social-btn" title="QQ登录">Q</div>
        </div>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // 保存用户信息到 localStorage
                    localStorage.setItem('currentUser', JSON.stringify({
                        id: data.userId,
                        username: data.username,
                        role: data.role
                    }));
                    
                    alert('登录成功！欢迎 ' + data.username);
                    // 登录成功后跳转到组队大厅
                    window.location.href = 'dashboard.html';
                } else {
                     const errorMsg = data.error || (typeof data === 'object' ? Object.values(data)[0] : data);
                    alert('登录失败: ' + (errorMsg || '未知错误'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('发生网络错误，请稍后重试');
            }
        });
        document.getElementById('toggleLoginPwd').addEventListener('change', function() {
            document.getElementById('password').type = this.checked ? 'text' : 'password';
        });
        document.getElementById('forgotLink').addEventListener('click', async function(ev) {
            ev.preventDefault();
            const identity = prompt('请输入您的邮箱或用户名：');
            if (!identity) return;
            try {
                const resp = await fetch('/api/auth/forgot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identity })
                });
                const data = await resp.json();
                if (resp.ok) {
                    alert('已发送重置令牌（演示模式显示令牌）：' + (data.tokenDemo || '请查收邮件'));
                    const token = prompt('请输入收到的重置令牌：');
                    if (!token) return;
                    const newPassword = prompt('请输入新的密码（至少8位且包含大小写和数字）：');
                    if (!newPassword) return;
                    const resetResp = await fetch('/api/auth/reset', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ identity, token, newPassword })
                    });
                    const resetData = await resetResp.json();
                    if (resetResp.ok) {
                        alert('密码重置成功，请使用新密码登录');
                    } else {
                        alert('重置失败：' + (resetData.error || '未知错误'));
                    }
                } else {
                    alert('发送失败：' + (data.error || '未知错误'));
                }
            } catch (e) {
                alert('网络错误，请稍后重试');
            }
        });
        document.getElementById('wxLoginBtn').addEventListener('click', function() {
            var target = window.location.origin + '/dashboard.html';
            window.location.href = '/api/auth/wechat/authorize?mode=qr&redirect=' + encodeURIComponent(target);
        });
    </script>
</body>
</html>
